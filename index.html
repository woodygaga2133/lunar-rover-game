<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>月球漫游 · 版本选择</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  color:#ccc;
  font-family:'Limelight','Segoe UI','PingFang SC',sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:48px;
  letter-spacing:0.05em;
}
h1 {
  font-size:clamp(48px, 8vw, 96px);
  font-weight:100;
  letter-spacing:0.25em;
  color:#fff;
  text-shadow:0 0 60px rgba(255,255,255,0.15);
}
.versions { display:flex; gap:32px; flex-wrap:wrap; justify-content:center; }
a.version {
  display:flex; flex-direction:column; align-items:center; gap:8px;
  width:200px; padding:32px 24px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1); border-radius:8px;
  color:#bbb; text-decoration:none;
  transition:all 0.3s ease;
}
a.version:hover {
  background:rgba(255,255,255,0.08);
  border-color:rgba(255,255,255,0.3);
  color:#fff; transform:translateY(-2px);
}
.version-num { font-size:32px; font-weight:300; letter-spacing:0.1em; color:#fff; }
.version-desc { font-size:12px; opacity:0.6; text-align:center; line-height:1.6; }
.footer {
  position:fixed; bottom:20px;
  font-size:11px; color:#444; letter-spacing:0.2em;
}
</style>
</head>
<body>
  <h1>LUNAR</h1>
  <div class="versions">
    <a class="version" href="v1.0.0/">
      <div class="version-num">v1.0.0</div>
      <div class="version-desc">初版部署<br>175km 月球</div>
    </a>
    <a class="version" href="v1.0.1/">
      <div class="version-num">v1.0.1</div>
      <div class="version-desc">物理 + 贴图<br>30km 月球</div>
    </a>
  </div>
  <div class="footer">CHOOSE VERSION</div>
</body>
</html>
