<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>月球漫游</title>
<style>
@font-face {
  font-family:'Broadway';
  /* 走 local() 不发 HTTP 请求；找不到就 fallback 到下面 font-family 列表 */
  src:local('Broadway'), local('Broadway Std');
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:monospace; }

/* ── 左上信息隐藏（JS 依赖这些 id，保留不删） */
#info { display:none; }

/* ── 底部操作提示 HUD ── */
#hud {
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
  display:flex; gap:18px; align-items:center;
  color:rgba(255,255,255,0.55); font-size:11px; pointer-events:none;
}
.wasd { display:flex; flex-direction:column; align-items:center; gap:3px; }
.wasd-row { display:flex; gap:3px; }
.hud-sep { width:1px; height:48px; background:rgba(255,255,255,0.15); margin:0 2px; }
.hud-other { line-height:2.1; color:rgba(255,255,255,0.55); }
.key {
  display:inline-flex; align-items:center; justify-content:center;
  min-width:22px; height:20px; padding:0 5px;
  border:1px solid rgba(255,255,255,0.2); border-radius:3px;
  background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.7); font-size:11px;
  letter-spacing:0;
}

/* ── 小地图 ── */
#minimap-wrap {
  position:fixed; right:12px; bottom:12px;
  width:240px; height:240px; pointer-events:none;
}
#minimap-canvas { display:block; width:240px; height:240px; }

#loadbar {
  position:fixed; bottom:18vh; left:50%; transform:translateX(-50%);
  width:360px; text-align:center; z-index:1001;
}
#loadbar-text {
  color:#aaa; font:13px monospace;
  margin-bottom:10px; letter-spacing:2px;
}
#loadbar-progress {
  width:100%; height:4px;
  background:rgba(255,255,255,0.08); border-radius:2px;
  overflow:hidden;
}
#loadbar-fill {
  width:0%; height:100%;
  background:linear-gradient(90deg, #6cf, #aef);
  transition:width 0.2s ease-out;
}

/* ── 开场标题（兼加载遮罩）── */
#title-overlay {
  position:fixed; top:0; left:0; right:0; bottom:0;
  display:flex; align-items:flex-start; justify-content:center;
  padding-top:18vh;
  pointer-events:none; z-index:1000;
  background:#000;
  transition: background 0.8s ease-out, opacity 0.8s ease-out;
}
#title-overlay.fade-out { opacity:0; }
#title-text {
  font-family:'Broadway','Limelight','Segoe UI',sans-serif;
  font-size:clamp(72px, 13vw, 180px);
  font-weight:100;
  letter-spacing:0.22em;
  color:#ffffff;
  text-shadow: 0 0 60px rgba(255,255,255,0.12);
}
/* ── 传送面板 ── */
#teleport-panel {
  position:fixed; top:12px; right:12px;
  display:flex; gap:6px; align-items:center;
  z-index:500; pointer-events:auto;
}
#teleport-input {
  width:70px; padding:4px 6px;
  background:rgba(0,0,0,0.7); border:1px solid rgba(255,255,255,0.2);
  color:#ccc; font:11px monospace; border-radius:3px; outline:none;
}
#teleport-btn {
  padding:4px 8px;
  background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
  color:#aaa; font:11px monospace; border-radius:3px; cursor:pointer;
}
#teleport-btn:hover { background:rgba(255,255,255,0.2); color:#fff; }
</style>
</head>
<body>

<div id="loadbar">
  <div id="loadbar-text">⏳ 读取地形数据...</div>
  <div id="loadbar-progress"><div id="loadbar-fill"></div></div>
</div>

<div id="title-overlay"><div id="title-text">LUNAR</div></div>

<!-- 保留 id 供 JS 使用，#info 已通过 CSS 隐藏 -->
<div id="info">
  <em id="spd">0</em><em id="cam">3RD</em>
  <em id="pos">0,0</em><em id="tiles">0</em>
</div>

<div id="hud">
  <!-- WASD 键位布局 -->
  <div class="wasd">
    <div class="wasd-row"><span class="key">W</span></div>
    <div class="wasd-row"><span class="key">A</span><span class="key">S</span><span class="key">D</span></div>
  </div>
  <div class="hud-sep"></div>
  <div class="hud-other">
    <span class="key">Shift</span> 加速
    &nbsp;&nbsp;<span class="key">右键</span> 旋转视角
    &nbsp;&nbsp;<span class="key">滚轮</span> 缩放
    &nbsp;&nbsp;<span style="color:rgba(255,255,255,0.35)">FPS</span> <span id="fps" style="color:rgba(255,255,255,0.55)">--</span>
  </div>
</div>

<div id="minimap-wrap">
  <canvas id="minimap-canvas" width="240" height="240"></canvas>
</div>

<div id="teleport-panel">
  <input id="teleport-input" type="text" placeholder="tile ID" maxlength="3" inputmode="numeric">
  <button id="teleport-btn">GO</button>
</div>

<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';

// ─── 单位：Three.js 世界坐标 = km（与 Blender GLB 一致）
// ─── 坐标：Blender Z-up → Three.js Y-up：[bx, by, bz] → [bx, bz, -by]
// ─── 车身 m 制建模，carRoot.scale=0.001 缩到 km 制

// ── Renderer ─────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFShadowMap;   // Moebius 锐利阴影
renderer.setClearColor(0x000000, 1);   // 纯黑背景
document.body.appendChild(renderer.domElement);

// ── Scene & Camera ────────────────────────────────────────────────────
const scene  = new THREE.Scene();
scene.fog = new THREE.Fog(0x040a14, 8, 120);  // 远景大气雾：8km起雾，120km完全遮蔽
const camera = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.0001, 1800);

// ── Sable + Moebius 融合手绘风 Shader ────────────────────────────────
// 核心原则：平地完全同色（消除3D感）+ 世界坐标散布石子痕迹（近景细节）
// Object.assign 而非 UniformsUtils.merge，后者会 clone Vector3 导致引用断裂
// ── 地面贴图：seamless rocks_ground_03 ──────────────────────────────
const _groundTex = new THREE.TextureLoader().load('../textures/rocks_ground_09.jpg');
_groundTex.wrapS = THREE.RepeatWrapping;
_groundTex.wrapT = THREE.RepeatWrapping;
_groundTex.colorSpace = THREE.SRGBColorSpace;
_groundTex.anisotropy = 4;        // 斜视时不糊

const terrainUniforms = Object.assign(
  THREE.UniformsUtils.merge([ THREE.UniformsLib['lights'] ]),
  {
    sunDir:    { value: new THREE.Vector3(1, 0.8, 0.4).normalize() },
    uBright:   { value: 1.6 },
    uGroundTex:{ value: _groundTex },
    uTexScale: { value: 50.0 },    // 每 20m 平铺一次（再放大一倍）
    uBumpScale:{ value: 1.5 },     // 凹凸强度
    uTexMix:   { value: 0.6 },     // 贴图灰度调制强度（0=无影响，1=±20% 全力变化）
  }
);

const TERRAIN_MAT = new THREE.ShaderMaterial({
  uniforms:     terrainUniforms,
  lights:       true,
  fog:          false,  // 手动在 fragment shader 中计算雾
  vertexColors: true,
  vertexShader: /* glsl */`
    #include <common>
    #include <shadowmap_pars_vertex>

    varying vec3 vNormal;
    varying vec3 vColor;
    varying vec3 vWorldPos;
    varying vec3 vViewPos;       // view space, for spot light 计算（Three.js 的 spotLights uniforms 也在 view space）
    varying vec3 vViewNormal;

    void main() {
      vNormal     = normalize(mat3(modelMatrix) * normal);
      vColor      = color.rgb;
      vec4 wp     = modelMatrix * vec4(position, 1.0);
      vWorldPos   = wp.xyz;
      vec4 vp     = modelViewMatrix * vec4(position, 1.0);
      vViewPos    = vp.xyz;
      vViewNormal = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * vp;
      #if NUM_DIR_LIGHT_SHADOWS > 0
        vDirectionalShadowCoord[0] = directionalShadowMatrix[0] * wp;
      #endif
    }
  `,
  fragmentShader: /* glsl */`
    #include <common>
    #include <packing>
    #include <lights_pars_begin>
    #include <shadowmap_pars_fragment>
	    // fog computed manually below

    varying vec3 vNormal;
    varying vec3 vColor;
    varying vec3 vWorldPos;
    varying vec3 vViewPos;
    varying vec3 vViewNormal;
    uniform vec3  sunDir;
    uniform float uBright;
    uniform sampler2D uGroundTex;
    uniform float uTexScale;
    uniform float uTexMix;
    uniform float uBumpScale;

    // 伪随机 hash（mod 限幅防止大数 sin 精度崩溃）
    vec2 hash2(vec2 p) {
      p = mod(p, 289.0);
      p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));
      return fract(sin(p) * 43758.5453);
    }
    float hash1(vec2 p) {
      p = mod(p, 289.0);
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
    }
    // 平滑 value noise（双线性插值 + 平滑曲线）
    float vnoise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      f = f * f * (3.0 - 2.0 * f);
      float a = hash1(i);
      float b = hash1(i + vec2(1.0, 0.0));
      float c = hash1(i + vec2(0.0, 1.0));
      float d = hash1(i + vec2(1.0, 1.0));
      return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
    }
    // 3 倍频段 fbm
    float fbm(vec2 p) {
      float v = 0.5 * vnoise(p);
      v += 0.25 * vnoise(p * 2.03);
      v += 0.125 * vnoise(p * 4.07);
      return v;
    }
    // 在世界 XZ 平面采样 fbm 高度场（米单位）
    // 返回 vec2 (gx, gz) = 高度梯度
    vec2 bumpGrad(vec2 wpMeters, float scale, float amp) {
      float e = 0.5 / scale;
      float h  = fbm(wpMeters * scale);
      float hx = fbm((wpMeters + vec2(e, 0.0)) * scale);
      float hz = fbm((wpMeters + vec2(0.0, e)) * scale);
      return vec2(hx - h, hz - h) * amp / e;
    }

    void main() {
      vec3 N = normalize(vNormal);

      // ── 球面经纬度采样 ──────────────────────────────────────────────
      // UV = (经度, 纬度)：北南极、赤道、任何高度的点 → 各自唯一 UV
      // 全月面整体均匀，无 mix/seam，无横向"圈"重复 pattern
      // 副作用：极区 lon 维度被压缩 → texture 在极点会有轻微 swirl，但月面玩家几乎察觉不到
      vec3 P = normalize(vWorldPos);
      float lon = atan(P.z, P.x);                          // 经度 [-π, π]
      float lat = asin(clamp(P.y, -1.0, 1.0));             // 纬度 [-π/2, π/2]
      // ×4.77 ≈ 30/(2π)，让 tile 大小跟原 XZ 投影差不多
      vec2 texUV = vec2(lon, lat) * uTexScale * 4.77;
      vec3 tex0  = texture2D(uGroundTex, texUV).rgb;
      vec3 texX  = texture2D(uGroundTex, texUV + vec2(0.004, 0.0)).rgb;
      vec3 texY  = texture2D(uGroundTex, texUV + vec2(0.0, 0.004)).rgb;
      float lum0 = (tex0.r + tex0.g + tex0.b) / 3.0;
      float lumX = (texX.r + texX.g + texX.b) / 3.0;
      float lumY = (texY.r + texY.g + texY.b) / 3.0;
      float dHx = (lumX - lum0) * uBumpScale;
      float dHy = (lumY - lum0) * uBumpScale;
      vec3 refV = abs(N.y) > 0.9 ? vec3(1.0, 0.0, 0.0) : vec3(0.0, 1.0, 0.0);
      vec3 Tn = normalize(cross(refV, N));
      vec3 Bn = cross(N, Tn);
      N = normalize(N - Tn * dHx - Bn * dHy);

      vec3 L = normalize(sunDir);

      float shadow = 1.0;
      #if NUM_DIR_LIGHT_SHADOWS > 0
        DirectionalLightShadow ds = directionalLightShadows[0];
        shadow = getShadow(
          directionalShadowMap[0], ds.shadowMapSize,
          ds.shadowBias, ds.shadowRadius,
          vDirectionalShadowCoord[0]
        );
      #endif

      // ── 12档色阶：背光冷色6档 + 受光暖色6档 ────────────────────────
      // shadow 不乘进 NdotL，而是最后做颜色 tint，阴影不会变黑
      // Half-Lambert：背光面 cold0 为底，有渐变细节，不比 cold0 更黑
      float rawNdotL = dot(N, L) * 0.5 + 0.5;

      float x  = rawNdotL * 12.0;
      float lo = floor(clamp(x, 0.0, 11.9999));
      float bt = smoothstep(0.25, 0.75, fract(x));
      float q  = lo + bt;

      // 背光冷色调（q: 0 → 6）— 可见的深蓝灰，冷调阴影，不死黑
      vec3 cold0 = vColor * vec3(0.150, 0.164, 0.202);
      vec3 cold1 = vColor * vec3(0.169, 0.184, 0.224);
      vec3 cold2 = vColor * vec3(0.190, 0.206, 0.248);
      vec3 cold3 = vColor * vec3(0.212, 0.229, 0.272);
      vec3 cold4 = vColor * vec3(0.234, 0.252, 0.294);
      vec3 cold5 = vColor * vec3(0.255, 0.273, 0.313);

      vec3 warm0 = vColor * vec3(0.655, 0.619, 0.533);
      vec3 warm1 = vColor * vec3(0.720, 0.675, 0.564);
      vec3 warm2 = vColor * vec3(0.789, 0.735, 0.601);
      vec3 warm3 = vColor * vec3(0.860, 0.796, 0.638);
      vec3 warm4 = vColor * vec3(0.930, 0.856, 0.674);
      vec3 warm5 = vColor * vec3(1.005, 0.913, 0.711);

      // 分段线性插值（12段）
      vec3 result;
      if      (q < 1.0)  result = mix(cold0, cold1, q);
      else if (q < 2.0)  result = mix(cold1, cold2, q - 1.0);
      else if (q < 3.0)  result = mix(cold2, cold3, q - 2.0);
      else if (q < 4.0)  result = mix(cold3, cold4, q - 3.0);
      else if (q < 5.0)  result = mix(cold4, cold5, q - 4.0);
      else if (q < 6.0)  result = mix(cold5, warm0, q - 5.0);  // 终结线
      else if (q < 7.0)  result = mix(warm0, warm1, q - 6.0);
      else if (q < 8.0)  result = mix(warm1, warm2, q - 7.0);
      else if (q < 9.0)  result = mix(warm2, warm3, q - 8.0);
      else if (q < 10.0) result = mix(warm3, warm4, q - 9.0);
      else if (q < 11.0) result = mix(warm4, warm5, q - 10.0);
      else               result = warm5;

	      // Moebius shadow + 距离淡出 + 太阳低角度淡出（防止斜射长黑线）
	      // 投射影子边缘锐利化：把 shadow 值 0.35~0.55 之间快速过渡（不再用 pow 的柔和）
	      float shadowPow   = smoothstep(0.35, 0.55, shadow);   // 1=lit / 0=shadow，边缘很窄
	      vec3  shadowTint  = vColor * vec3(0.035, 0.050, 0.10);
	      float shadowStr   = smoothstep(4.5, 7.0, q);
	      // 距离淡出：相机 30m 内全实，70m 外完全消失
	      float distFromCam = length(vWorldPos - cameraPosition);
	      float distFade    = 1.0 - smoothstep(0.030, 0.070, distFromCam);
	      // 太阳高度淡出：sun < 25° 时完全没影子，> 40° 才完全可见
	      //   tan(25°)=0.47 → 1m 石头最长影子 2m，可接受
	      //   sin(25°)=0.42, sin(40°)=0.64
	      vec3 surfUp = normalize(vWorldPos);
	      float sunElev = dot(sunDir, surfUp);
	      float sunFade = smoothstep(0.26, 0.50, sunElev);   // sin(15°)=0.26, sin(30°)=0.50
	      float shadowAmt   = (1.0 - shadowPow) * 0.90 * distFade * sunFade;
	      float shadowEdge  = fwidth(shadow) * 3.0;
	      float inkLine     = smoothstep(0.02, 0.05, shadowEdge) * shadowAmt;
	      result = mix(result, shadowTint, shadowAmt * shadowStr);
	      result = mix(result, vec3(0.0, 0.008, 0.025), inkLine * 0.50 * shadowStr);

      // 程序生成的小石子点点已删（被贴图替代）

      // ── 车头灯 SpotLight 叠加（view space 计算）─────────────────────────
      // Three.js 把 spotLights[i].position / .direction 都转到 view space
      // direction = (light - target).normalize() = 从 target 指向 light（非发射方向）
      // 表面在锥内：(从表面到光) 和 direction 同向 → dot ≈ +1
      #if NUM_SPOT_LIGHTS > 0
        vec3 spotAccum = vec3(0.0);
        vec3 NV = normalize(vViewNormal);
        for (int i = 0; i < NUM_SPOT_LIGHTS; i++) {
          vec3 toLight = spotLights[i].position - vViewPos;
          float dist   = length(toLight);
          vec3  L      = toLight / dist;
          float ang    = dot(L, spotLights[i].direction);
          float spotA  = smoothstep(spotLights[i].coneCos, spotLights[i].penumbraCos, ang);
          if (spotA > 0.0) {
            float distA = 1.0 - clamp(dist / max(spotLights[i].distance, 1e-5), 0.0, 1.0);
            distA = pow(distA, spotLights[i].decay);
            float NoL = max(dot(NV, L), 0.0);
            spotAccum += spotLights[i].color * spotA * distA * NoL;
          }
        }
        // 用 vColor 调制 → 暗面（如石头）反射少，亮面反射多，避免石头被打成亮爆
        result += spotAccum * vColor * 0.7;
      #endif

	      // ── 贴图灰度调制（用开头已经采样的 lum0，不再重复采样）─────
	      float texMod = mix(1.0, 0.80 + lum0 * 0.40, uTexMix);
	      result *= texMod;

	      gl_FragColor = vec4(min(result * uBright, vec3(1.0)), 1.0);
    }
  `,
});

// 没有顶点色的 tile 用 Moebius 冷蓝灰填充
const DEFAULT_VERT_COLOR = new THREE.Color(0x7080a0);

// ── 石头专用材质：克隆 TERRAIN_MAT 但关掉贴图/凹凸 → 纯色 toon
const ROCK_MAT = TERRAIN_MAT.clone();
ROCK_MAT.uniforms.uTexMix.value   = 0.0;   // 关闭灰度调制
ROCK_MAT.uniforms.uBumpScale.value = 0.0;  // 关闭凹凸扰动
// sunDir / uGroundTex 用引用共享 + 显式 update 兜底

// ── Inverted Hull 描边辅助 ────────────────────────────────────────────
function addHullOutline(mesh, pct = 0.03) {
  const ol = new THREE.Mesh(
    mesh.geometry,
    new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.BackSide })
  );
  ol.scale.setScalar(1 + pct);
  ol.renderOrder = -1;
  mesh.add(ol);
}

// ── 渐变天空（depthTest:false + pos.xyww，永远在最底层，杜绝 z-fight）
const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    depthTest:  false,
    depthWrite: false,
    uniforms: {
      topColor:  { value: new THREE.Color().setRGB(0.06, 0.08, 0.18) },   // 深空蓝黑（可见线性值）
      midColor:  { value: new THREE.Color().setRGB(0.08, 0.10, 0.20) },
      horizColor:{ value: new THREE.Color().setRGB(0.16, 0.19, 0.33) },  // 地平线深蓝灰
      sunColor:  { value: new THREE.Color(0x8c4a18) },   // 太阳方向暖辉
      sunDir:    { value: new THREE.Vector3(1, 0, 0) },  // 由游戏循环更新
    },
    vertexShader: `
      varying float vY;
      varying vec3  vDir;
      void main() {
        vec3 n = normalize(position);
        vY   = n.y;
        vDir = n;
        vec4 pos = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        gl_Position = pos.xyww;
      }
    `,
    fragmentShader: `
      uniform vec3 topColor;
      uniform vec3 midColor;
      uniform vec3 horizColor;
      uniform vec3 sunColor;
      uniform vec3 sunDir;
      varying float vY;
      varying vec3  vDir;
      void main() {
        // 渐变压在相机可见的窄区间内（vY -0.15 → 0.25）
        // vY=0(地平线)=horizColor 全量，vY=0.6渐变到topColor
        float t = smoothstep(-0.05, 0.85, vY);
        vec3 col = mix(horizColor, topColor, t);

        // 太阳方向辉光
        float sunDot    = max(dot(vDir, normalize(sunDir)), 0.0);
        float horizMask = smoothstep(0.20, -0.10, abs(vY));
        float glow      = pow(sunDot, 5.0) * horizMask * 1.2;
        col += sunColor * glow;

        gl_FragColor = vec4(col, 1.0);
      }
    `,
  });
// 天空球已移除，背景用 clearColor 黑色

// ── 星星（正常深度测试：被地形遮挡，不遮地形）──────────────────────
// 放在 450km，比地形(~30km)远，比相机 far(1800km)近，深度测试正常工作
// depthWrite:false 防止星星遮挡彼此时写入深度造成黑块
// ── 星空：10000 颗，分布在整个球面，大小/颜色分级（参考真实星图）──
{
  const N = 10000;
  const radius = 450;
  const buf    = new Float32Array(N * 3);
  const sizes  = new Float32Array(N);
  const colors = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    // 均匀球面分布（不只上半球）
    const u = Math.random();
    const phi = Math.acos(2 * u - 1);
    const th  = 2 * Math.PI * Math.random();
    buf[i*3]   = radius * Math.sin(phi) * Math.cos(th);
    buf[i*3+1] = radius * Math.cos(phi);
    buf[i*3+2] = radius * Math.sin(phi) * Math.sin(th);
    // 大小分布：85% 微星(0.5~1.5px) + 13% 中星(1.5~3px) + 2% 亮星(3~6px)
    const r = Math.random();
    if      (r < 0.85) sizes[i] = 0.5 + Math.random();
    else if (r < 0.98) sizes[i] = 1.5 + Math.random() * 1.5;
    else               sizes[i] = 3.0 + Math.random() * 3.0;
    // 颜色：70% 白 + 20% 蓝白 + 10% 黄白（真实星系类型分布大致如此）
    const tint = Math.random();
    if (tint < 0.70) { colors[i*3]=1.00; colors[i*3+1]=1.00; colors[i*3+2]=1.00; }
    else if (tint < 0.90) { colors[i*3]=0.78; colors[i*3+1]=0.86; colors[i*3+2]=1.00; }
    else                  { colors[i*3]=1.00; colors[i*3+1]=0.88; colors[i*3+2]=0.72; }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(buf, 3));
  geo.setAttribute('aSize',    new THREE.BufferAttribute(sizes, 1));
  geo.setAttribute('aColor',   new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.ShaderMaterial({
    vertexShader: /* glsl */`
      attribute float aSize;
      attribute vec3  aColor;
      varying vec3 vC;
      void main() {
        vC = aColor;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = aSize;
      }
    `,
    fragmentShader: /* glsl */`
      varying vec3 vC;
      void main() {
        // 圆形星点 + 软边缘
        vec2 d = gl_PointCoord - 0.5;
        float r = length(d);
        if (r > 0.5) discard;
        float a = 1.0 - smoothstep(0.30, 0.50, r);
        gl_FragColor = vec4(vC, a);
      }
    `,
    transparent:  true,
    depthWrite:   false,
    blending:     THREE.AdditiveBlending,   // 互相叠加，密集区域更亮
  });
  const stars = new THREE.Points(geo, mat);
  stars.frustumCulled = false;
  scene.add(stars);
}

const SHOW_SMALL_ROCKS   = false;      // 小石头全局开关（false = 不 scatter / 不渲染）

// ── 简易确定性 PRNG ──────────────────────────────────────────────
function _hashRng(seed) {
  let s = seed | 0;
  return function () {
    s = (s + 0x6D2B79F5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function _worldCell(kmX, kmZ) {
  return (Math.floor(kmX / ROCK_CELL_KM) * 73856093 +
          Math.floor(kmZ / ROCK_CELL_KM) * 19349663) >>> 0;
}

// ── 自建低多边形石头几何（替代 GLB，省 GPU）─────────────────────────
// 选项：'cone5'  6 v / 5 t（最便宜）
//      'cone7'  8 v / 7 t（中等，外观更圆）
//      'cap10' 11 v /18 t（最贵，半球+斜面，更接近真石头）
const ROCK_SHAPE = 'cone7';

let _discGeo = null;

// 通用 N 面锥（N 个底点 + 1 个顶点，每个底点带 jitter）
function _makeConeRock(sides, height) {
  const verts = new Float32Array((sides + 1) * 3);
  // 用确定性 seed 让每次启动一样（不会乱跳）
  let s = 12345;
  const rand = () => { s = (s * 1664525 + 1013904223) | 0; return ((s >>> 0) % 1000) / 1000; };
  for (let i = 0; i < sides; i++) {
    const a = (i + (rand()-0.5)*0.4) * (Math.PI * 2 / sides);
    const rr = 0.5 * (0.80 + rand() * 0.40);  // 半径 0.40~0.60，不规则
    verts[i*3]   = rr * Math.cos(a);
    verts[i*3+1] = (rand() - 0.5) * 0.05;     // 底也有点起伏
    verts[i*3+2] = rr * Math.sin(a);
  }
  // apex 略偏中心，高度有抖动
  verts[sides*3]   = (rand() - 0.5) * 0.08;
  verts[sides*3+1] = height * (0.85 + rand() * 0.30);
  verts[sides*3+2] = (rand() - 0.5) * 0.08;
  const idx = new Uint16Array(sides * 3);
  for (let i = 0; i < sides; i++) {
    // 索引顺序：i → apex → (i+1) ，让法线朝外
    idx[i*3]   = i;
    idx[i*3+1] = sides;            // apex
    idx[i*3+2] = (i+1) % sides;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(verts, 3));
  g.setIndex(new THREE.BufferAttribute(idx, 1));
  const n = sides + 1;
  const c = new Float32Array(n * 3);
  for (let k = 0; k < n; k++) { c[k*3]=ROCK_COLOR.r; c[k*3+1]=ROCK_COLOR.g; c[k*3+2]=ROCK_COLOR.b; }
  g.setAttribute('color', new THREE.BufferAttribute(c, 3));
  g.computeVertexNormals();
  return g;
}

// "饼盖"：半球的 N 等分简化版（更圆润），10 底 + 1 顶 = 11 v / 18 t（含 1 圈中间环 8 边）
function _makeCapRock() {
  // 10 底点（y=0）
  // 8 中环点（y=h/2，半径=0.7r）
  // 1 顶点（y=h）
  const sides = 8;
  const innerR = 0.35, outerR = 0.50, h = 0.40;
  const n = sides * 2 + 1;
  const verts = new Float32Array(n * 3);
  let s = 54321;
  const rand = () => { s = (s * 1664525 + 1013904223) | 0; return ((s >>> 0) % 1000) / 1000; };
  for (let i = 0; i < sides; i++) {
    const a = (i + (rand()-0.5)*0.3) * (Math.PI * 2 / sides);
    const r1 = outerR * (0.85 + rand()*0.30);
    const r2 = innerR * (0.85 + rand()*0.30);
    // 底
    verts[i*3]   = r1 * Math.cos(a);
    verts[i*3+1] = (rand()-0.5)*0.04;
    verts[i*3+2] = r1 * Math.sin(a);
    // 中环
    verts[(sides+i)*3]   = r2 * Math.cos(a);
    verts[(sides+i)*3+1] = h * 0.55 * (0.9 + rand()*0.2);
    verts[(sides+i)*3+2] = r2 * Math.sin(a);
  }
  // 顶
  verts[sides*2*3]   = (rand()-0.5)*0.06;
  verts[sides*2*3+1] = h;
  verts[sides*2*3+2] = (rand()-0.5)*0.06;
  // 面（绕向：让外法线朝外）
  const apex = sides * 2;
  const idx = [];
  for (let i = 0; i < sides; i++) {
    const i2 = (i+1) % sides;
    // 下半 quad（2 tri）
    idx.push(i,  sides+i, i2);
    idx.push(i2, sides+i, sides+i2);
    // 上半 tri
    idx.push(sides+i, apex, sides+i2);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(verts, 3));
  g.setIndex(idx);
  const c = new Float32Array(n * 3);
  for (let k = 0; k < n; k++) { c[k*3]=ROCK_COLOR.r; c[k*3+1]=ROCK_COLOR.g; c[k*3+2]=ROCK_COLOR.b; }
  g.setAttribute('color', new THREE.BufferAttribute(c, 3));
  g.computeVertexNormals();
  return g;
}

function _getDiscGeo() {
  if (_discGeo) return _discGeo;
  switch (ROCK_SHAPE) {
    case 'cone5': _discGeo = _makeConeRock(5, 0.35); break;

  const n = _discGeo.attributes.position.count;
  const triCount = _discGeo.index ? _discGeo.index.count/3 : n/3;
  console.log(`[Rock] geo: ${ROCK_SHAPE}, ${n} verts, ${triCount} tris`);

}

// ── 合并 N 个实例到一个 BufferGeometry ──────────────────────────────
const _qR = new THREE.Quaternion(), _upR = new THREE.Vector3();
const _pR = new THREE.Vector3(),   _sR = new THREE.Vector3();
const _YR = new THREE.Vector3(0, 1, 0);
const _v0R = new THREE.Vector3(), _v1R = new THREE.Vector3(), _v2R = new THREE.Vector3();
const _e1R = new THREE.Vector3(), _e2R = new THREE.Vector3();
const _c0R = new THREE.Color(), _c1R = new THREE.Color(), _c2R = new THREE.Color();

function _mergeRocks(baseGeo, list) {
  const sp = baseGeo.attributes.position;
  const sn = baseGeo.attributes.normal;
  const sc = baseGeo.attributes.color;
  const si = baseGeo.index;
  const sv = sp.count;
  const N = list.length;
  const op = new Float32Array(sv*N*3);
  const on = new Float32Array(sv*N*3);
  const oc = new Float32Array(sv*N*3);
  for (let i = 0; i < N; i++) {
    const m = list[i].matrix.elements;
    const nm = list[i].normalMatrix.elements;
    const rc = list[i].color; const off = i * sv;
    for (let v = 0; v < sv; v++) {
      const px=sp.getX(v), py=sp.getY(v), pz=sp.getZ(v);
      const j = (off+v)*3;
      op[j]   = m[0]*px + m[4]*py + m[8]*pz  + m[12];
      op[j+1] = m[1]*px + m[5]*py + m[9]*pz  + m[13];
      op[j+2] = m[2]*px + m[6]*py + m[10]*pz + m[14];
      const nx=sn.getX(v), ny=sn.getY(v), nz=sn.getZ(v);
      const tnx = nm[0]*nx + nm[3]*ny + nm[6]*nz;
      const tny = nm[1]*nx + nm[4]*ny + nm[7]*nz;
      const tnz = nm[2]*nx + nm[5]*ny + nm[8]*nz;
      const l = 1 / Math.sqrt(tnx*tnx + tny*tny + tnz*tnz + 1e-30);
      on[j]=tnx*l; on[j+1]=tny*l; on[j+2]=tnz*l;
      oc[j]=rc.r; oc[j+1]=rc.g; oc[j+2]=rc.b;
    }
  }
  let oi = null;
  if (si) {
    const ic = si.count;
    oi = new Uint32Array(ic * N);
    for (let i = 0; i < N; i++) { const b = i*sv; for (let j = 0; j < ic; j++) oi[i*ic+j] = si.getX(j) + b; }
  }
  const out = new THREE.BufferGeometry();
  out.setAttribute('position', new THREE.BufferAttribute(op, 3));
  out.setAttribute('normal', new THREE.BufferAttribute(on, 3));
  out.setAttribute('color', new THREE.BufferAttribute(oc, 3));
  if (oi) out.setIndex(new THREE.BufferAttribute(oi, 1));
  return out;
}

// ── Per-tile cell bin（确定性 picking 关键）──────────────────────────
// tile.id → Map<cellHash, [triData...]>
//   triData = {p0,p1,p2,c0,c1,c2,area,cumArea}（cumArea 在 cell 内累积）
// 在 loadTile 后调用 _binTileToCells；unloadTile 后调用 _tileBins.delete
const _tileBins = new Map();

function _cellHash(ix, iz) {
  return (ix * 73856093 + iz * 19349663) >>> 0;
}

function _binTileToCells(tileId, group) {
  const cellMap = new Map();
  const _tmpC0 = new THREE.Color(), _tmpC1 = new THREE.Color(), _tmpC2 = new THREE.Color();
  const _tmp0 = new THREE.Vector3(), _tmp1 = new THREE.Vector3(), _tmp2 = new THREE.Vector3();
  const _te1 = new THREE.Vector3(), _te2 = new THREE.Vector3();

  group.traverse(o => {
    if (!o.isMesh) return;
    const pos = o.geometry.attributes.position; if (!pos) return;
    const col = o.geometry.attributes.color;
    const idx = o.geometry.index;
    const m = o.matrixWorld.elements;
    const count = pos.count;
    const triCount = idx ? idx.count/3 : count/3;
    for (let t = 0; t < triCount; t++) {
      const i0 = idx ? idx.getX(t*3)   : t*3;
      const i1 = idx ? idx.getX(t*3+1) : t*3+1;
      const i2 = idx ? idx.getX(t*3+2) : t*3+2;
      // 取 local 顶点 → world
      const lx0=pos.getX(i0), ly0=pos.getY(i0), lz0=pos.getZ(i0);
      const lx1=pos.getX(i1), ly1=pos.getY(i1), lz1=pos.getZ(i1);
      const lx2=pos.getX(i2), ly2=pos.getY(i2), lz2=pos.getZ(i2);
      const wx0 = m[0]*lx0 + m[4]*ly0 + m[8]*lz0 + m[12];
      const wy0 = m[1]*lx0 + m[5]*ly0 + m[9]*lz0 + m[13];
      const wz0 = m[2]*lx0 + m[6]*ly0 + m[10]*lz0 + m[14];
      const wx1 = m[0]*lx1 + m[4]*ly1 + m[8]*lz1 + m[12];
      const wy1 = m[1]*lx1 + m[5]*ly1 + m[9]*lz1 + m[13];
      const wz1 = m[2]*lx1 + m[6]*ly1 + m[10]*lz1 + m[14];
      const wx2 = m[0]*lx2 + m[4]*ly2 + m[8]*lz2 + m[12];
      const wy2 = m[1]*lx2 + m[5]*ly2 + m[9]*lz2 + m[13];
      const wz2 = m[2]*lx2 + m[6]*ly2 + m[10]*lz2 + m[14];
      // 计算面积
      _tmp0.set(wx0, wy0, wz0); _tmp1.set(wx1, wy1, wz1); _tmp2.set(wx2, wy2, wz2);
      _te1.subVectors(_tmp1, _tmp0); _te2.subVectors(_tmp2, _tmp0);
      const crx = _te1.y*_te2.z - _te1.z*_te2.y;
      const cry = _te1.z*_te2.x - _te1.x*_te2.z;
      const crz = _te1.x*_te2.y - _te1.y*_te2.x;
      const area = 0.5 * Math.sqrt(crx*crx + cry*cry + crz*crz);
      if (area < 1e-12) continue;
      // 颜色
      let c0r,c0g,c0b,c1r,c1g,c1b,c2r,c2g,c2b;
      if (col) {
        c0r = col.getX(i0); c0g = col.getY(i0); c0b = col.getZ(i0);
        c1r = col.getX(i1); c1g = col.getY(i1); c1b = col.getZ(i1);
        c2r = col.getX(i2); c2g = col.getY(i2); c2b = col.getZ(i2);
      } else {
        c0r = c1r = c2r = ROCK_COLOR.r;
        c0g = c1g = c2g = ROCK_COLOR.g;
        c0b = c1b = c2b = ROCK_COLOR.b;
      }
      // 按 centroid 分配 cell
      const mx = (wx0+wx1+wx2) / 3, mz = (wz0+wz1+wz2) / 3;
      const cellIx = Math.floor(mx / ROCK_CELL_KM);
      const cellIz = Math.floor(mz / ROCK_CELL_KM);
      const ch = _cellHash(cellIx, cellIz);
      let bucket = cellMap.get(ch);
      if (!bucket) { bucket = []; cellMap.set(ch, bucket); }
      bucket.push({
        p0:[wx0,wy0,wz0], p1:[wx1,wy1,wz1], p2:[wx2,wy2,wz2],
        c0:[c0r,c0g,c0b], c1:[c1r,c1g,c1b], c2:[c2r,c2g,c2b],
        area, cumArea: 0,    // 后面在每个 cell 内累积
      });
    }
  });
  // 为每个 cell bucket 计算 cumArea
  for (const bucket of cellMap.values()) {
    let acc = 0;
    for (const tri of bucket) { acc += tri.area; tri.cumArea = acc; }
    bucket.__totalArea = acc;
  }
  _tileBins.set(tileId, cellMap);
}

// ── 收集 1.5km 内三角面（旧 path，scatterRocks 不再用，留档参考）──
function _collectTriangles() {
  const tris = [];
  const r2 = ROCK_RADIUS_KM * ROCK_RADIUS_KM;
  const cx = car.pos.x, cy = car.pos.y, cz = car.pos.z;
  for (const g of loaded.values()) {
    g.traverse(o => {
      if (!o.isMesh) return;
      const pos = o.geometry.attributes.position; if (!pos) return;
      const col = o.geometry.attributes.color;
              const idx = o.geometry.index;
      const m = o.matrixWorld.elements;
      const count = pos.count;
      // 预变换全部顶点
      const wv = [];
              const wc = col ? [] : null;
      for (let i = 0; i < count; i++) {
        const lx=pos.getX(i), ly=pos.getY(i), lz=pos.getZ(i);
        wv.push(
          m[0]*lx + m[4]*ly + m[8]*lz  + m[12],
          m[1]*lx + m[5]*ly + m[9]*lz  + m[13],
          m[2]*lx + m[6]*ly + m[10]*lz + m[14]
        );
        if (col) {
          wc.push(col.getX(i), col.getY(i), col.getZ(i));
        }
      }
      const triCount = idx ? idx.count/3 : count/3;
      for (let t = 0; t < triCount; t++) {
        const i0 = idx ? idx.getX(t*3)   : t*3;
        const i1 = idx ? idx.getX(t*3+1) : t*3+1;
        const i2 = idx ? idx.getX(t*3+2) : t*3+2;
        if (col) {
          _c0R.set(wc[i0*3], wc[i0*3+1], wc[i0*3+2]);
          _c1R.set(wc[i1*3], wc[i1*3+1], wc[i1*3+2]);
          _c2R.set(wc[i2*3], wc[i2*3+1], wc[i2*3+2]);
        } else {
          _c0R.set(ROCK_COLOR.r, ROCK_COLOR.g, ROCK_COLOR.b);
          _c1R.set(ROCK_COLOR.r, ROCK_COLOR.g, ROCK_COLOR.b);
          _c2R.set(ROCK_COLOR.r, ROCK_COLOR.g, ROCK_COLOR.b);
        }
        _v0R.set(wv[i0*3], wv[i0*3+1], wv[i0*3+2]);
        _v1R.set(wv[i1*3], wv[i1*3+1], wv[i1*3+2]);
        _v2R.set(wv[i2*3], wv[i2*3+1], wv[i2*3+2]);
        const mx=(_v0R.x+_v1R.x+_v2R.x)/3, my=(_v0R.y+_v1R.y+_v2R.y)/3, mz=(_v0R.z+_v1R.z+_v2R.z)/3;
        const dx=mx-cx, dy=my-cy, dz=mz-cz;
        if (dx*dx+dy*dy+dz*dz > r2) continue;
        _e1R.subVectors(_v1R, _v0R);
        _e2R.subVectors(_v2R, _v0R);
        const crx=_e1R.y*_e2R.z-_e1R.z*_e2R.y, cry=_e1R.z*_e2R.x-_e1R.x*_e2R.z, crz=_e1R.x*_e2R.y-_e1R.y*_e2R.x;
        const area=0.5*Math.sqrt(crx*crx+cry*cry+crz*crz);
        if (area<1e-12) continue;
        const prev=tris.length>0?tris[tris.length-1].cumArea:0;
        tris.push({p0:_v0R.clone(),p1:_v1R.clone(),p2:_v2R.clone(),c0:_c0R.clone(),c1:_c1R.clone(),c2:_c2R.clone(),area,cumArea:prev+area});
      }
    });
  }
  return tris;
}

let _rockOrigin = null;

// 共享 alloc，避免每石头 new Matrix4/Matrix3/Color
const _mRk = new THREE.Matrix4();
const _nRk = new THREE.Matrix3();
const _cRk = new THREE.Color();
const _eRk = new THREE.Euler();
const _qNorm = new THREE.Quaternion();

function scatterRocks() {
  const geo = _getDiscGeo();
  if (_tileBins.size === 0) return;
  console.time('[Rock] scatter');

  while (_rockGroup.children.length) {
    _rockGroup.children[0].geometry.dispose();
    _rockGroup.remove(_rockGroup.children[0]);
  }

  const TKM = ROCK_TARGET_M * 0.001;
  const list = [];

  const cMinX = Math.floor((car.pos.x - ROCK_RADIUS_KM) / ROCK_CELL_KM);
  const cMaxX = Math.floor((car.pos.x + ROCK_RADIUS_KM) / ROCK_CELL_KM);
  const cMinZ = Math.floor((car.pos.z - ROCK_RADIUS_KM) / ROCK_CELL_KM);
  const cMaxZ = Math.floor((car.pos.z + ROCK_RADIUS_KM) / ROCK_CELL_KM);
  const R2 = ROCK_RADIUS_KM * ROCK_RADIUS_KM;
  let total = 0, emptyCells = 0;

  for (let cx = cMinX; cx <= cMaxX; cx++) {
    for (let cz = cMinZ; cz <= cMaxZ; cz++) {
      // 圆形窗口
      const ccx = (cx + 0.5) * ROCK_CELL_KM, ccz = (cz + 0.5) * ROCK_CELL_KM;
      if ((ccx-car.pos.x)*(ccx-car.pos.x) + (ccz-car.pos.z)*(ccz-car.pos.z) > R2) continue;

      // 找该 cell 的三角形（合并多个 tile 的 bin）
      const ch = _cellHash(cx, cz);
      let cellTris = null, cellArea = 0;
      for (const bin of _tileBins.values()) {
        const b = bin.get(ch);
        if (b && b.length) {
          if (!cellTris) { cellTris = b; cellArea = b.__totalArea; }
          else { cellTris = cellTris.concat(b); cellArea += b.__totalArea; }
        }
      }
      if (!cellTris) { emptyCells++; continue; }

      // 若有多 tile 合并的 bucket，重算 cumArea
      let multiTile = false;
      if (cellTris !== _tileBins.values().next().value?.get(ch)) {
        for (const bin of _tileBins.values()) { if (bin.get(ch) && bin.get(ch) !== cellTris) { multiTile = true; break; } }
      }
      if (multiTile) {
        let acc = 0;
        const fixed = [];
        for (const t of cellTris) { acc += t.area; fixed.push({...t, cumArea: acc}); }
        cellTris = fixed; cellArea = acc;
      }

      // 固定每 cell 数量
      for (let i = 0; i < ROCKS_PER_CELL; i++) {
        const rng = _hashRng((ch + i * 0x9E3779B9) | 0);
        const pick = rng() * cellArea;
        let lo=0, hi=cellTris.length-1;
        while (lo<hi) { const mid=(lo+hi)>>1; if (cellTris[mid].cumArea < pick) lo=mid+1; else hi=mid; }
        const tri = cellTris[lo];

        let u=rng(), v=rng();
        if (u+v>1) { u=1-u; v=1-v; }
        const w=1-u-v;
        const sx = u*tri.p0[0] + v*tri.p1[0] + w*tri.p2[0];
        const sy = u*tri.p0[1] + v*tri.p1[1] + w*tri.p2[1];
        const sz = u*tri.p0[2] + v*tri.p1[2] + w*tri.p2[2];
        const rr = Math.sqrt(sx*sx+sy*sy+sz*sz);
        _upR.set(sx/rr, sy/rr, sz/rr);

        const mul = 0.4 + rng()*1.6;
        const scale = TKM * mul;
        // 沿地面法线下沉 20% → 露出主体，底部贴地
        const embed = scale * 0.20;
        _pR.set(sx - _upR.x*embed, sy - _upR.y*embed, sz - _upR.z*embed);

        _eRk.set((rng()-0.5)*0.8, rng()*Math.PI*2, (rng()-0.5)*0.8);
        _qR.setFromEuler(_eRk);
        _qNorm.setFromUnitVectors(_YR, _upR);
        _qR.premultiply(_qNorm);
        _sR.set(scale, scale*(0.7+rng()*0.6), scale*(0.5+rng()*0.5));

        _mRk.compose(_pR, _qR, _sR);
        _nRk.setFromMatrix4(_mRk).invert().transpose();
        _cRk.r = (u*tri.c0[0] + v*tri.c1[0] + w*tri.c2[0]) * ROCK_DARKEN;
        _cRk.g = (u*tri.c0[1] + v*tri.c1[1] + w*tri.c2[1]) * ROCK_DARKEN;
        _cRk.b = (u*tri.c0[2] + v*tri.c1[2] + w*tri.c2[2]) * ROCK_DARKEN;
        // 必须复制：list 元素会被后面 _mergeRocks 引用
        list.push({
          matrix: _mRk.clone(),
          normalMatrix: _nRk.clone(),
          color: _cRk.clone(),
        });
        total++;
      }
    }
  }

  if (total === 0) { console.timeEnd('[Rock] scatter'); return; }
  const mg = _mergeRocks(geo, list);
  const mesh = new THREE.Mesh(mg, ROCK_MAT);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.frustumCulled = false;
  _rockGroup.add(mesh);

  _rockOrigin = car.pos.clone();
  console.timeEnd('[Rock] scatter');
  console.log(`[Rock] ${total} rocks (${emptyCells} empty cells) → 1 draw call`);
}

// ══════════════════════════════════════════════════════════════════════
//  大石头：6 个 GLB 变体，per-cell 稀疏散布
// ══════════════════════════════════════════════════════════════════════
const BIG_ROCK_PROB    = 0.90;    // 每 cell 每次尝试的命中概率
const BIG_ROCK_PASSES  = 3;       // 每 cell 尝试几次（多 pass 给 ×3 密度）
const BIG_ROCK_TARGET_M = 2.8;    // ~2.8m 直径
const BIG_ROCK_DARKEN  = 0.90;    // 比地形深 10%（再亮 5%）
const _bigRockGeos = [];
const _bigRockHeights = [];   // 每个变体的高度比例（h / maxDim），用于精确埋入百分比
const _bigRockGroup = new THREE.Group();
_bigRockGroup.name = 'BigRockScatter';
scene.add(_bigRockGroup);

// 加载 6 个 GLB
let _bigRockLoadCount = 0;
for (let i = 0; i < 6; i++) {
  const idx = i;
  new GLTFLoader().load(`../rocks/big/big_${String(i).padStart(2,'0')}.glb`, gltf => {
    let g = null;
    gltf.scene.traverse(o => { if (o.isMesh && !g) g = o.geometry.clone(); });
    if (!g) return;
    g.deleteAttribute('normal');
    g = BufferGeometryUtils.mergeVertices(g, 1e-4);
    g.computeVertexNormals();
    g.computeBoundingBox();
    const b = g.boundingBox;
    const cx = (b.min.x + b.max.x) * 0.5, cz = (b.min.z + b.max.z) * 0.5;
    const sz = Math.max(b.max.x - b.min.x, b.max.y - b.min.y, b.max.z - b.min.z);
    const heightRatio = (b.max.y - b.min.y) / sz;   // 实际高度占比（扁平 < 1）
    _bigRockHeights[idx] = heightRatio;
    g.translate(-cx, -b.min.y, -cz);   // 底部对齐 y=0
    g.scale(1/sz, 1/sz, 1/sz);
    const n = g.attributes.position.count;
    const c = new Float32Array(n * 3);
    for (let k = 0; k < n; k++) { c[k*3]=ROCK_COLOR.r; c[k*3+1]=ROCK_COLOR.g; c[k*3+2]=ROCK_COLOR.b; }
    g.setAttribute('color', new THREE.BufferAttribute(c, 3));
    _bigRockGeos[idx] = g;
    _bigRockLoadCount++;
    if (_bigRockLoadCount === 6) {
      console.log('[BigRocks] 6 GLB loaded');
      _rockOrigin = null;  // 触发首次 scatter
    }
  }, undefined, e => console.warn(`big_${idx}: failed`, e));
}

function scatterBigRocks() {
  if (_bigRockGeos.length < 6 || _tileBins.size === 0) return;
  console.time('[BigRock] scatter');
  while (_bigRockGroup.children.length) {
    _bigRockGroup.children[0].geometry.dispose();
    _bigRockGroup.remove(_bigRockGroup.children[0]);
  }
  const TKM = BIG_ROCK_TARGET_M * 0.001;
  // 6 lists per variant
  const lists = _bigRockGeos.map(() => []);

  const cMinX = Math.floor((car.pos.x - ROCK_RADIUS_KM) / ROCK_CELL_KM);
  const cMaxX = Math.floor((car.pos.x + ROCK_RADIUS_KM) / ROCK_CELL_KM);
  const cMinZ = Math.floor((car.pos.z - ROCK_RADIUS_KM) / ROCK_CELL_KM);
  const cMaxZ = Math.floor((car.pos.z + ROCK_RADIUS_KM) / ROCK_CELL_KM);
  const R2 = ROCK_RADIUS_KM * ROCK_RADIUS_KM;
  let total = 0;

  for (let cx = cMinX; cx <= cMaxX; cx++) {
    for (let cz = cMinZ; cz <= cMaxZ; cz++) {
      const ccx = (cx + 0.5) * ROCK_CELL_KM, ccz = (cz + 0.5) * ROCK_CELL_KM;
      if ((ccx-car.pos.x)*(ccx-car.pos.x) + (ccz-car.pos.z)*(ccz-car.pos.z) > R2) continue;

      // 每 cell 多 pass：每次 salt 不同 → 独立掷骰
      const ch = _cellHash(cx, cz);
      for (let pass = 0; pass < BIG_ROCK_PASSES; pass++) {
        const rng = _hashRng((ch ^ (0xBADCAFE + pass * 0x12345)) | 0);
        if (rng() > BIG_ROCK_PROB) continue;

        // 找该 cell 的三角形
        let cellTris = null, cellArea = 0;
        for (const bin of _tileBins.values()) {
          const b = bin.get(ch);
          if (b && b.length) {
            if (!cellTris) { cellTris = b; cellArea = b.__totalArea; }
            else { cellTris = cellTris.concat(b); cellArea += b.__totalArea; }
          }
        }
        if (!cellTris) continue;

        const pick = rng() * cellArea;
        let lo=0, hi=cellTris.length-1;
        while (lo<hi) { const mid=(lo+hi)>>1; if (cellTris[mid].cumArea < pick) lo=mid+1; else hi=mid; }
        const tri = cellTris[lo];
        let u=rng(), v=rng();
        if (u+v>1) { u=1-u; v=1-v; }
        const w=1-u-v;
        const sx = u*tri.p0[0] + v*tri.p1[0] + w*tri.p2[0];
        const sy = u*tri.p0[1] + v*tri.p1[1] + w*tri.p2[1];
        const sz = u*tri.p0[2] + v*tri.p1[2] + w*tri.p2[2];
        const rr = Math.sqrt(sx*sx+sy*sy+sz*sz);
        _upR.set(sx/rr, sy/rr, sz/rr);

        const mul = 0.7 + rng() * 0.8;
        const scale = TKM * mul;
        const variantIdx = Math.floor(rng() * 6);
        const ySc = scale * (0.8 + rng() * 0.4);
        const zSc = scale * (0.7 + rng() * 0.4);
        const hRatio = _bigRockHeights[variantIdx] || 0.7;
        const worldHeight = hRatio * ySc;
        const embed = worldHeight * 0.30;
        _pR.set(sx - _upR.x*embed, sy - _upR.y*embed, sz - _upR.z*embed);

        _eRk.set((rng()-0.5)*0.4, rng()*Math.PI*2, (rng()-0.5)*0.4);
        _qR.setFromEuler(_eRk);
        _qNorm.setFromUnitVectors(_YR, _upR);
        _qR.premultiply(_qNorm);
        _sR.set(scale, ySc, zSc);

        _mRk.compose(_pR, _qR, _sR);
        _nRk.setFromMatrix4(_mRk).invert().transpose();
        _cRk.r = (u*tri.c0[0] + v*tri.c1[0] + w*tri.c2[0]) * BIG_ROCK_DARKEN;
        _cRk.g = (u*tri.c0[1] + v*tri.c1[1] + w*tri.c2[1]) * BIG_ROCK_DARKEN;
        _cRk.b = (u*tri.c0[2] + v*tri.c1[2] + w*tri.c2[2]) * BIG_ROCK_DARKEN;
        lists[variantIdx].push({
          matrix: _mRk.clone(),
          normalMatrix: _nRk.clone(),
          color: _cRk.clone(),
        });
        total++;
      }
    }
  }

  // 每个 variant 合并出一个 mesh
  for (let i = 0; i < 6; i++) {
    if (lists[i].length === 0) continue;
    const mg = _mergeRocks(_bigRockGeos[i], lists[i]);
    const mesh = new THREE.Mesh(mg, ROCK_MAT);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.frustumCulled = false;
    _bigRockGroup.add(mesh);
  }
  console.timeEnd('[BigRock] scatter');
  console.log(`[BigRock] ${total} big rocks (6 variants → ${_bigRockGroup.children.length} draw calls)`);
}

cv.addEventListener('mousedown', e => {
  mouseBtn |= (1 << e.button);
  lastMX = e.clientX; lastMY = e.clientY;

    'up=', upN.x.toFixed(3), upN.y.toFixed(3), upN.z.toFixed(3),
    'fwd·up=', dotFwdUp.toExponential(2));
});

// ── 动态地形加载 ──────────────────────────────────────────────────────
const TILE_BASE   = '../moon%20small_tiles/';     // 单一 smooth 版本
const TILE_SCALE  = 1;                          // 不放大，保持 Blender 原始 ~30km 半径
const TILE_POS_SCALE = 30.0 / 175.0;            // metadata 中心点是 175 标度，除以这个换成 30 标度
const LOAD_DIST   = 4;     // 30km 月球地平线 ~170m，4km 足够覆盖可见地形 + 远景余量
const UNLOAD_DIST = 6;
const CHECK_MS    = 3000;

const loader        = new GLTFLoader();
let   tileData      = [];
let   startTileId   = null;          // 玩家正下方 tile，需要等它加载完才能进游戏
const loaded        = new Map();        // id → Group
const loading       = new Set();
const tileMeshesMap = new Map();        // id → Mesh[]
let   allTileMeshes = [];

// ★ 关键修复：Blender Z-up → Three.js Y-up
//    Blender: X=右, Y=前, Z=上
//    Three.js: X=右, Y=上, Z=前
//    转换：[bx, by, bz] → Three.js [bx, bz, -by]
function tileCenter3(t) {
  const [bx, by, bz] = t.center;
  return new THREE.Vector3(bx * TILE_POS_SCALE, bz * TILE_POS_SCALE, -by * TILE_POS_SCALE);
}

function loadTile(t) {
  if (loaded.has(t.id) || loading.has(t.id)) return;
  loading.add(t.id);
  loader.load(`${TILE_BASE}${t.name}.glb`, gltf => {
    const group  = gltf.scene;
    group.scale.setScalar(TILE_SCALE);   // 保持 Blender 原始 30km 半径
    const meshes = [];
    group.traverse(child => {
      if (!child.isMesh) return;
      if (!child.geometry.attributes.normal)
        child.geometry.computeVertexNormals();
      // 补全 color 属性（Moebius shader 需要顶点色）
      if (!child.geometry.attributes.color) {
        const n   = child.geometry.attributes.position.count;
        const buf = new Float32Array(n * 3);
        for (let i = 0; i < n; i++) {
          buf[i*3]   = DEFAULT_VERT_COLOR.r;
          buf[i*3+1] = DEFAULT_VERT_COLOR.g;
          buf[i*3+2] = DEFAULT_VERT_COLOR.b;
        }
        child.geometry.setAttribute('color', new THREE.BufferAttribute(buf, 3));
      }
      child.material      = TERRAIN_MAT;
      child.receiveShadow = true;   // 接收车体阴影
      meshes.push(child);
    });
    scene.add(group);
    group.updateMatrixWorld(true);   // 确保射线检测立即生效
    loaded.set(t.id, group);
    tileMeshesMap.set(t.id, meshes);
    loading.delete(t.id);
    rebuildMeshList();
    _binTileToCells(t.id, group);    // 把该 tile 三角形 bin 进 cell map（不立即重撒，等车走出去再补）
    document.getElementById('tiles').textContent = loaded.size;
    // 进度条
    const total = tileData.length;
    document.getElementById('loadbar-fill').style.width = (loaded.size / total * 100) + '%';
    document.getElementById('loadbar-text').textContent = `加载地形 ${loaded.size}/${total}`;
    // 玩家正下方那块 tile 加载完 → 隐藏 loadbar、淡出标题、开始游戏
    if (t.id === startTileId) {
      document.getElementById('loadbar').style.display = 'none';
      document.getElementById('title-overlay').style.background = 'transparent';
      setTimeout(() => {
        document.getElementById('title-overlay').classList.add('fade-out');
        cam.intro = false;
      }, 1500);
    }
  }, undefined, err => {
    loading.delete(t.id);
    console.warn('tile load failed:', t.name, err);
  });
}

function unloadTile(id) {
  const g = loaded.get(id);
  if (!g) return;
  // 深度释放：先 dispose GPU 资源，再断 JS 引用让 GC 回收
  g.traverse(c => {
    if (!c.isMesh) return;
    if (c.geometry) {
      // 主动删每个 attribute（dispose 内部会处理，但明确释放更稳）
      for (const k in c.geometry.attributes) c.geometry.deleteAttribute(k);
      if (c.geometry.index) c.geometry.setIndex(null);
      c.geometry.dispose();
      c.geometry = null;
    }
    c.material = null;       // TERRAIN_MAT 是共享单例，不要 dispose，只断引用
  });
  while (g.children.length) g.remove(g.children[0]);
  scene.remove(g);
  loaded.delete(id);
  tileMeshesMap.delete(id);
  _tileBins.delete(id);
  rebuildMeshList();
  document.getElementById('tiles').textContent = loaded.size;
}

function rebuildMeshList() {
  allTileMeshes = [];
  for (const meshes of tileMeshesMap.values())
    allTileMeshes.push(...meshes);
}

function checkTiles() {
  if (!tileData.length) return;
  for (const t of tileData) {
    const dist = car.pos.distanceTo(tileCenter3(t));
    if (dist < LOAD_DIST)        loadTile(t);
    else if (dist > UNLOAD_DIST) unloadTile(t.id);
  }
}

fetch('../moon%20small_tiles/metadata.json')
  .then(r => r.json())
  .then(meta => {
    tileData = meta.tiles;
    // 选起始 tile：优先赤道附近且接近本初子午线
    const start = tileData.find(t => Math.abs(t.lat) < 10 && Math.abs(t.lon) < 10)
               || tileData.find(t => Math.abs(t.lat) < 10)
               || tileData[0];
    startTileId = start.id;
    // 把车放到起始 tile 中心的上方一点（让物理 snap 落到正确高度）
    const startCenter = tileCenter3(start);
    const startUp     = startCenter.clone().normalize();
    car.pos.copy(startCenter).addScaledVector(startUp, 0.05);  // 50m 高
    // 排序：距车最近的 tile 优先加载
    tileData.sort((a, b) =>
      car.pos.distanceTo(tileCenter3(a)) - car.pos.distanceTo(tileCenter3(b))
    );
    document.getElementById('loadbar-text').textContent = `加载地形 0/${meta.count}`;
    checkTiles();
    setInterval(checkTiles, CHECK_MS);
  })
  .catch(err => {
    document.getElementById('loadbar-text').textContent = '❌ 无法读取地形';
    console.error(err);
  });

// ── 垂直检测射线（全部静态复用，每帧各用一次）────────────────────────
const _hRay   = new THREE.Raycaster();   // 四轮地形高度
const _camRay = new THREE.Raycaster();   // 相机地面碰撞

// 在 worldPos 正上方往下打一条射线，返回地形半径（到球心距离）
// far=50 覆盖缩放后地形高差 ±17km，起点 +25km 避免在地面以下发射
function getTerrainR(worldPos) {
  if (allTileMeshes.length === 0) return worldPos.length();
  const up  = worldPos.clone().normalize();
  const ori = worldPos.clone().addScaledVector(up, 25.0);
  _hRay.set(ori, up.clone().negate());
  _hRay.far = 50;
  const hits = _hRay.intersectObjects(allTileMeshes, false);
  return hits.length > 0 ? hits[0].point.length() : worldPos.length();
}

// 四轮地形检测：right = 水平右方向（切平面内）
function snapToTerrain(right) {
  tFL = getTerrainR(car.pos.clone().addScaledVector(car.fwd,  AXLE_HALF).addScaledVector(right, -TRACK_HALF)) + WHEEL_R_KM;
  tFR = getTerrainR(car.pos.clone().addScaledVector(car.fwd,  AXLE_HALF).addScaledVector(right,  TRACK_HALF)) + WHEEL_R_KM;
  tRL = getTerrainR(car.pos.clone().addScaledVector(car.fwd, -AXLE_HALF).addScaledVector(right, -TRACK_HALF)) + WHEEL_R_KM;
  tRR = getTerrainR(car.pos.clone().addScaledVector(car.fwd, -AXLE_HALF).addScaledVector(right,  TRACK_HALF)) + WHEEL_R_KM;
}

// ── 物理常量（km/s 制）────────────────────────────────────────────────
const TURN        = 1.6;
const ACCEL_NORM  = 0.012;           // 普通加速度
const ACCEL_BOOST = 0.060;           // Shift 加速度（5×）
const BRAKE       = 0.018;
const DRAG        = 1.6;
const MAXSPD_NORM  = 50  / 3600;    // 50 km/h
const MAXSPD_BOOST = 100 / 3600;    // 100 km/h（Shift 加速极限）

// ── 主更新 ────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function update(dt) {
  // 当前位置法线（转向用移动前的 up，保证旋转在旧切平面内）
  let up = car.pos.clone().normalize();

  // 转向：在切平面内绕法线旋转 fwd
  const turnAngle = TURN * dt;
  if (keys['KeyA'] || keys['ArrowLeft'])  car.fwd.applyAxisAngle(up,  turnAngle);
  if (keys['KeyD'] || keys['ArrowRight']) car.fwd.applyAxisAngle(up, -turnAngle);

  // 油门 / 刹车（Shift 加速）
  const boost   = keys['ShiftLeft'] || keys['ShiftRight'];
  const maxSpd  = boost ? MAXSPD_BOOST : MAXSPD_NORM;
  const accel   = boost ? ACCEL_BOOST  : ACCEL_NORM;
  if (keys['KeyW'] || keys['ArrowUp'])
    car.speed = Math.min(car.speed + accel * dt, maxSpd);
  else if (keys['KeyS'] || keys['ArrowDown'])
    car.speed = Math.max(car.speed - BRAKE * dt, -MAXSPD_NORM * 0.5);
  else
    car.speed *= Math.exp(-DRAG * dt);
  if (Math.abs(car.speed) < 1e-5) car.speed = 0;

  // 球面移动：沿切平面 fwd 方向行驶
  car.pos.addScaledVector(car.fwd, car.speed * dt);

  // 平行移动：把 fwd 从旧切平面搬到新切平面（球面曲率修正）
  up = car.pos.clone().normalize();
  car.fwd.sub(up.clone().multiplyScalar(car.fwd.dot(up))).normalize();

  // 切平面右方向 = up × fwd（右手系）
  const right = new THREE.Vector3().crossVectors(up, car.fwd).normalize();

  // 四轮地形检测（每帧直接赋值，不 lerp）
  // 曾经加 lerp 是为了配合 4 帧节流，现在每帧都检测，lerp 只会造成下坡腾空
  snapToTerrain(right);
  wFL = tFL;  wFR = tFR;
  wRL = tRL;  wRR = tRR;

  // 四轮均值 → 目标地面高度
  groundY = (wFL + wFR + wRL + wRR) * 0.25;

  // 首次贴地：tiles 加载完的第一帧强制 snap，防止车开场飘在空中
  if (!car.groundedInit && allTileMeshes.length > 0) {
    car.pos.setLength(groundY);
    car.vRad = 0;
    car.airborne = false;
    car.groundedInit = true;
  } else {
    // ── 重力 + 抛物线 ───────────────────────────────────────────────
    car.vRad -= GRAVITY_KM * dt;
    let newR = car.pos.length() + car.vRad * dt;
    if (newR <= groundY) {
      // 平滑跟随地面：lerp 到 groundY，而不是瞬间 snap（小起伏不再"跳一跳"）
      const k = 1 - Math.exp(-dt * 15);   // 时间常数约 67ms
      newR = newR + (groundY - newR) * k;
      car.vRad = 0;
      car.airborne = false;
    } else {
      car.airborne = true;
    }
    car.pos.setLength(newR);
  }

  // ── 石头散布触发 ──
  if (allTileMeshes.length>0) {
    if (!_rockOrigin || car.pos.distanceTo(_rockOrigin) > ROCK_RADIUS_KM * 0.5) {
      if (SHOW_SMALL_ROCKS) scatterRocks();
      scatterBigRocks();
      _rockOrigin = car.pos.clone();   // 必须在外层 set，否则关掉小石头时 _rockOrigin 永不更新
    }
  }

  // 车轮自转
  car.wSpin += car.speed * dt / WHEEL_R_KM;
  wheels.forEach(w => { w.rotation.x = car.wSpin; });

  // ── 车辆姿态：四接触点 → 正交基 ─────────────────────────────────────
  // 四个轮胎地面接触点（世界坐标）
  const cFL = car.pos.clone().addScaledVector(car.fwd,   AXLE_HALF).addScaledVector(right, -TRACK_HALF).normalize().multiplyScalar(wFL);
  const cFR = car.pos.clone().addScaledVector(car.fwd,   AXLE_HALF).addScaledVector(right,  TRACK_HALF).normalize().multiplyScalar(wFR);
  const cRL = car.pos.clone().addScaledVector(car.fwd,  -AXLE_HALF).addScaledVector(right, -TRACK_HALF).normalize().multiplyScalar(wRL);
  const cRR = car.pos.clone().addScaledVector(car.fwd,  -AXLE_HALF).addScaledVector(right,  TRACK_HALF).normalize().multiplyScalar(wRR);

  // 车辙印记（后轮，前进后退均记录）
  const _speedSign = car.speed >= 0 ? 1 : -1;
  const _tl = _speedSign > 0 ? cRL : cFL;  // 前进记后轮，后退记前轮
  const _tr = _speedSign > 0 ? cRR : cFR;
  // 腾空时设标记，落地后第一个点要打断车辙连接
  if (car.airborne) _trackBreakNext = true;
  if (Math.abs(car.speed) > 0.5 / 3600 && !car.airborne) {
    addTrackPoints(_tl, _tr, _trackBreakNext);
    _trackBreakNext = false;
    _rebuildTrackGeo();
  }

  // 前后轴心 & 左右轴心（各取平均）
  const cFront = cFL.clone().add(cFR).multiplyScalar(0.5);
  const cRear  = cRL.clone().add(cRR).multiplyScalar(0.5);
  const cLeft  = cFL.clone().add(cRL).multiplyScalar(0.5);
  const cRight = cFR.clone().add(cRR).multiplyScalar(0.5);

  // 步骤1：从前后 & 左右轴心推出车的大致前进方向和侧向
  const carFwd0   = cFront.clone().sub(cRear);    // 前 - 后 ≈ 前进方向
  const carRight0 = cRight.clone().sub(cLeft);    // 右 - 左 ≈ 右方向
  // 步骤2：叉积 fwd0 × right0 → 坡面法线（朝上）
  //   验算（平地）：(0,0,1)×(1,0,0) = (0,1,0) ✓
  const carUp    = new THREE.Vector3().crossVectors(carFwd0, carRight0).normalize();
  // 步骤3：正交化，以 carFwd0 为主轴，carUp 为次轴重新推导 carRight
  //   carRight = carUp × carFwd0：(0,1,0)×(0,0,1) = (1,0,0) ✓
  const carRight = new THREE.Vector3().crossVectors(carUp, carFwd0).normalize();
  // 步骤4：最终 carFwd 由 carRight × carUp 保证三轴完全正交
  //   (1,0,0)×(0,1,0) = (0,0,1) ✓
  const carFwd   = new THREE.Vector3().crossVectors(carRight, carUp).normalize();

  const rotMat = new THREE.Matrix4().makeBasis(carRight, carUp, carFwd);
  carRoot.quaternion.setFromRotationMatrix(rotMat);
  carRoot.position.copy(car.pos);
  carRoot.matrix.compose(carRoot.position, carRoot.quaternion, carRoot.scale);

  // 太阳轨道动画
  sunAngle += (2 * Math.PI / DAY_SECS) * dt;
  const sunDir3 = new THREE.Vector3(
    Math.cos(sunAngle) * 1000,
    Math.sin(sunAngle) * 1000,
    300
  ).normalize();

  // 视觉太阳球留在 1000 km 处
  sunMesh.position.copy(sunDir3).multiplyScalar(1000);

  // DirectionalLight 贴近车辆 0.3 km，shadow camera 精度才够
  // 方向不变（(light.pos - light.target) / dist = sunDir3），阴影采样窗口只覆盖车周围
  sun.position.copy(car.pos).addScaledVector(sunDir3, 0.3);
  sun.target.position.copy(car.pos);
  sun.target.updateMatrixWorld();

  terrainUniforms.sunDir.value.copy(sunDir3);
  ROCK_MAT.uniforms.sunDir.value.copy(sunDir3);     // 石头材质显式同步
  _trackMat.uniforms.sunDir.value.copy(sunDir3);    // 车辙材质显式同步
  // 环境光极低，保持 Moebius 高对比度
  ambient.intensity = 0.04 + Math.max(0, sunDir3.y) * 0.05;

  // 太阳本地高度：用于车头灯 + DirectionalLight 强度
  // sunHt > 0 = sun 在本地地平线上方（白天），< 0 = 下方（夜晚）
  const _hlUp = car.pos.clone().normalize();
  const sunHt = sunDir3.dot(_hlUp);
  // 关键：DirectionalLight 不知道月球曲率，必须显式按本地太阳高度淡出
  //   sunHt < -0.05: intensity 0（彻底无方向光，纯靠环境光）
  //   sunHt >  0.10: intensity 满（白天）
  sun.intensity = Math.max(0, Math.min(1, (sunHt + 0.05) / 0.15)) * 3.5;
  const hlT     = Math.max(0, Math.min(1, (0.10 - sunHt) / 0.18));
  const hlInten = hlT * 2.5;     // 强度减半（6→2.5）
  headlights.forEach(hl => { hl.intensity = hlInten; });
  // 灯泡可见 mesh：白天暗灰，夜晚发亮（与 SpotLight 同色）
  headlightBulbs.forEach(b => {
    const k = 0.15 + hlT * 0.85;
    b.material.color.setRGB(0xff/255 * k, 0xe2/255 * k, 0xc4/255 * k);
  });

  // ── 相机（WoW 轨道）──────────────────────────────────────────────────
	  // 玩家开始操作就退出开场
	  if (cam.intro && (Math.abs(car.speed) > 5 / 3600 || (mouseBtn & 5))) {
	    cam.intro = false;
	  }
	  // 行驶中 rubber-band 回正
	  const isMoving = Math.abs(car.speed) > 5 / 3600;
	  if (isMoving && !(mouseBtn & 5) && !cam.intro) cam.yawOff *= Math.exp(-RUBBER_BAND * dt);

  // 相机水平朝向：从车尾方向（-fwd）绕 up 旋转 cam.yawOff
  up = car.pos.clone().normalize();   // setLength 后位置已变，重新计算法线
  // fwd 重投影到当前切平面，消除 setLength 带来的数值漂移
  car.fwd.sub(up.clone().multiplyScalar(car.fwd.dot(up))).normalize();
  const hDir = car.fwd.clone().applyAxisAngle(up, Math.PI + cam.yawOff);

  const hDist = cam.dist * Math.cos(cam.pitch);
  const vDist = cam.dist * Math.sin(cam.pitch);

  // 看向目标（车身上方 2 m）
  const lookTarget = car.pos.clone().addScaledVector(up, 0.002);
  let   idealPos   = lookTarget.clone()
    .addScaledVector(hDir, hDist)
    .addScaledVector(up,   vDist);

  // ── 相机地面碰撞（复用 _camRay，每帧一次）───────────────────────────
  const camUp = idealPos.clone().normalize();
  _camRay.set(idealPos.clone().addScaledVector(camUp, 25), camUp.clone().negate());
  _camRay.far = 50;
  const camHits = _camRay.intersectObjects(allTileMeshes, false);
  if (camHits.length > 0) {
    const surfaceR = camHits[0].point.length() + 0.001;
    if (idealPos.length() < surfaceR) idealPos.setLength(surfaceR);
  } else {
    if (idealPos.length() < groundY + 0.001) idealPos.setLength(groundY + 0.001);
  }

  // 直接赋位置，不 lerp——消除加速时相机滞后拉远的感觉
  camera.position.copy(idealPos);
  camera.up.copy(up);   // ★ 球面法线即天顶方向，防止非极点位置地平线歪斜
  camera.lookAt(lookTarget);

  // HUD（km/h 显示）
  document.getElementById('spd').textContent = (Math.abs(car.speed) * 3600).toFixed(0);
  document.getElementById('pos').textContent  =
    `${car.pos.x.toFixed(3)}, ${car.pos.z.toFixed(3)}`;
}

//  小地图
// ══════════════════════════════════════════════════════════════════════
const miniC   = document.getElementById('minimap-canvas');
const miniCtx = miniC.getContext('2d');
const MAP_PX_RADIUS = 90;           // 圆形地图半径（像素，240px 画布留 30px 给罗盘）
const MAP_RANGE     = Math.PI * 0.7 / 3;  // 视野角半径（弧度）

// ── 小地图配色（与地形12色阶对应）──────────────────────────────────────
// 底色 = cold0 级别（深蓝黑）
const MM_BASE = '#12192A';
// 夜面叠加层：cold1~2 级别深蓝灰
const MM_SHD_R=18, MM_SHD_G=30, MM_SHD_B=58, MM_SHD_A=160;
// 日照叠加层：warm2~3 级别中灰
const MM_LIT_R=90, MM_LIT_G=100, MM_LIT_B=112, MM_LIT_A=135;
// 晨昏渐变：cold4~warm0 过渡
const MM_DSK1_R=60, MM_DSK1_G=78, MM_DSK1_B=98, MM_DSK1_A=105;  // 靠日侧
const MM_DSK0_R=30, MM_DSK0_G=48, MM_DSK0_B=80, MM_DSK0_A=145;  // 靠夜侧
const MM_BAND = 0.18;

// 每帧缓存的车辆基向量
const _mmUp    = new THREE.Vector3();
const _mmFwd   = new THREE.Vector3();
const _mmRight = new THREE.Vector3();
const _mmTmp   = new THREE.Vector3();

function refreshMinimapBasis() {
  _mmUp.copy(car.pos).normalize();
  // 车头方向：直接用 car.fwd，再投影到当前切平面（消除数值漂移）
  _mmFwd.copy(car.fwd).sub(_mmUp.clone().multiplyScalar(car.fwd.dot(_mmUp))).normalize();
  _mmRight.crossVectors(_mmFwd, _mmUp).normalize();
}

// 球面方向 → 小地图画布坐标（方位等距投影）
function projectAzimuthal(targetWorld) {
  _mmTmp.copy(targetWorld).normalize();
  const dot = Math.max(-1, Math.min(1, _mmUp.dot(_mmTmp)));
  const d = Math.acos(dot);
  const tx = _mmTmp.x - _mmUp.x * dot;
  const ty = _mmTmp.y - _mmUp.y * dot;
  const tz = _mmTmp.z - _mmUp.z * dot;
  const tLen2 = tx*tx + ty*ty + tz*tz;
  if (tLen2 < 1e-12) return { x:0, y:0, outOfRange:false };
  const invLen = 1 / Math.sqrt(tLen2);
  const tanRight = (tx*_mmRight.x + ty*_mmRight.y + tz*_mmRight.z) * invLen;
  const tanFwd   = (tx*_mmFwd.x   + ty*_mmFwd.y   + tz*_mmFwd.z)   * invLen;
  const scale = MAP_PX_RADIUS / MAP_RANGE;
  return { x: tanRight*d*scale, y: tanFwd*d*scale, outOfRange: d > MAP_RANGE };
}

function worldDirToScreenAngle(dirWorld) {
  const dotU = dirWorld.dot(_mmUp);
  const tx = dirWorld.x - _mmUp.x*dotU;
  const ty = dirWorld.y - _mmUp.y*dotU;
  const tz = dirWorld.z - _mmUp.z*dotU;
  if (tx*tx + ty*ty + tz*tz < 1e-9) return 0;
  return Math.atan2(tx*_mmRight.x + ty*_mmRight.y + tz*_mmRight.z,
                    tx*_mmFwd.x   + ty*_mmFwd.y   + tz*_mmFwd.z);
}

// 半分辨率光照层（130×130 → 放大到 200×200）
const LIGHT_W = 130, LIGHT_H = 130;
const _litCanvas = document.createElement('canvas');
_litCanvas.width  = LIGHT_W; _litCanvas.height = LIGHT_H;
const _litCtx = _litCanvas.getContext('2d');
const _litImg = _litCtx.createImageData(LIGHT_W, LIGHT_H);
const LIGHT_CX = LIGHT_W/2, LIGHT_CY = LIGHT_H/2;
const LIGHT_R  = LIGHT_W / 2;          // 填满半分辨率画布，放大后覆盖整个地图圆
const LIGHT_SCALE = LIGHT_R / MAP_RANGE;
const _mmSunDir = new THREE.Vector3();

function updateLightingLayer() {
  _mmSunDir.set(Math.cos(sunAngle)*1000, Math.sin(sunAngle)*1000, 300).normalize();
  const Sx = _mmSunDir.dot(_mmRight);
  const Sy = _mmSunDir.dot(_mmFwd);
  const Sz = _mmSunDir.dot(_mmUp);
  const data = _litImg.data;
  const R2 = LIGHT_R * LIGHT_R;
  for (let py = 0; py < LIGHT_H; py++) {
    const dy = py - LIGHT_CY;
    for (let px = 0; px < LIGHT_W; px++) {
      const dx = px - LIGHT_CX;
      const r2 = dx*dx + dy*dy;
      const idx = (py*LIGHT_W + px)*4;
      if (r2 > R2) { data[idx+3]=0; continue; }
      const r = Math.sqrt(r2);
      const alpha = r / LIGHT_SCALE;
      const sa = Math.sin(alpha), ca = Math.cos(alpha);
      const invR = r > 0.001 ? sa/r : 0;
      const lit = dx*invR*Sx - dy*invR*Sy + ca*Sz;
      if (lit > MM_BAND) {
        data[idx]=MM_LIT_R; data[idx+1]=MM_LIT_G; data[idx+2]=MM_LIT_B; data[idx+3]=MM_LIT_A;
      } else if (lit > -MM_BAND) {
        const t = (lit+MM_BAND)/(2*MM_BAND);
        data[idx]   = (MM_DSK0_R + t*(MM_DSK1_R-MM_DSK0_R))|0;
        data[idx+1] = (MM_DSK0_G + t*(MM_DSK1_G-MM_DSK0_G))|0;
        data[idx+2] = (MM_DSK0_B + t*(MM_DSK1_B-MM_DSK0_B))|0;
        data[idx+3] = (MM_DSK0_A + t*(MM_DSK1_A-MM_DSK0_A))|0;
      } else {
        data[idx]=MM_SHD_R; data[idx+1]=MM_SHD_G; data[idx+2]=MM_SHD_B; data[idx+3]=MM_SHD_A;
      }
    }
  }
  _litCtx.putImageData(_litImg, 0, 0);
}

function drawMinimap() {
  const W = miniC.width, H = miniC.height;
  const cx = W/2, cy = H/2, R = MAP_PX_RADIUS;
  const g = miniCtx;
  g.clearRect(0, 0, W, H);

  refreshMinimapBasis();

  // 外圈刻度（冷灰色调，匹配 cold4~5）
  for (let i = 0; i < 16; i++) {
    const a = i*Math.PI/8, isMajor = (i%4)===0;
    const r1 = R+4, r2 = R+(isMajor?11:7);
    g.strokeStyle = isMajor ? 'rgba(140,160,190,0.9)' : 'rgba(100,120,155,0.5)';
    g.lineWidth = isMajor ? 1.5 : 1;
    g.beginPath();
    g.moveTo(cx+Math.sin(a)*r1, cy-Math.cos(a)*r1);
    g.lineTo(cx+Math.sin(a)*r2, cy-Math.cos(a)*r2);
    g.stroke();
  }

  g.save();
  g.beginPath(); g.arc(cx, cy, R, 0, Math.PI*2); g.clip();

  // 底色（cold0 级别）
  g.fillStyle = MM_BASE; g.fillRect(0, 0, W, H);

  // 网格线（cold3~4 色调，低饱和蓝灰）
  g.strokeStyle = 'rgba(55,75,110,0.28)'; g.lineWidth = 1;
  for (let i=1; i<=3; i++) { g.beginPath(); g.arc(cx,cy,R*i/3,0,Math.PI*2); g.stroke(); }
  g.strokeStyle = 'rgba(55,75,110,0.18)';
  for (let i=0; i<8; i++) {
    const a=i*Math.PI/4;
    g.beginPath(); g.moveTo(cx,cy); g.lineTo(cx+Math.sin(a)*R,cy-Math.cos(a)*R); g.stroke();
  }

  // 光照层
  updateLightingLayer();
  g.imageSmoothingEnabled = true;
  g.drawImage(_litCanvas, 0, 0, W, H);

  // 夜间车头灯晕
  const playerLit = _mmSunDir.dot(_mmUp);
  if (playerLit < 0.05) {
    const haloR = 32;
    const halo = g.createRadialGradient(cx,cy,0,cx,cy,haloR);
    const a = Math.min(0.28,(0.05-playerLit)*1.6);
    halo.addColorStop(0, `rgba(255,220,150,${a})`);
    halo.addColorStop(0.6, `rgba(255,200,120,${a*0.3})`);
    halo.addColorStop(1, 'rgba(255,200,120,0)');
    g.fillStyle = halo;
    g.beginPath(); g.arc(cx,cy,haloR,0,Math.PI*2); g.fill();
  }

  // 边缘暗角
  const vg = g.createRadialGradient(cx,cy,R*0.6,cx,cy,R);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,5,15,0.45)');
  g.fillStyle = vg; g.beginPath(); g.arc(cx,cy,R,0,Math.PI*2); g.fill();

  // 太阳方向指示点
  _mmSunDir.set(Math.cos(sunAngle)*1000, Math.sin(sunAngle)*1000, 300).normalize();
  const sunAng = worldDirToScreenAngle(_mmSunDir);
  const sx = cx+Math.sin(sunAng)*(R-14), sy = cy-Math.cos(sunAng)*(R-14);
  g.save(); g.translate(sx,sy);
  g.fillStyle='#ffe070'; g.shadowColor='#ffd860'; g.shadowBlur=10;
  g.beginPath(); g.arc(0,0,3,0,Math.PI*2); g.fill();
  g.shadowBlur=0; g.restore();

  // 车辆指示（脉冲环 + 三角箭头，用 warm4 色调）
  const pulse = (performance.now()%1400)/1400;
  g.strokeStyle = `rgba(180,195,210,${(1-pulse)*0.5})`; g.lineWidth=1.2;
  g.beginPath(); g.arc(cx,cy,5+pulse*16,0,Math.PI*2); g.stroke();
  g.save(); g.translate(cx,cy);
  g.fillStyle='rgba(200,215,230,0.95)'; g.shadowColor='rgba(160,185,210,1)'; g.shadowBlur=10;
  g.beginPath(); g.moveTo(0,-10); g.lineTo(-7,6); g.lineTo(0,3); g.lineTo(7,6); g.closePath(); g.fill();
  g.shadowBlur=0; g.restore();

  g.restore();

  // 边框（cold5 色调细线）
  g.strokeStyle='rgba(120,145,180,0.6)'; g.lineWidth=1.5;
  g.beginPath(); g.arc(cx,cy,R,0,Math.PI*2); g.stroke();
  g.strokeStyle='rgba(80,105,145,0.35)'; g.lineWidth=1;
  g.beginPath(); g.arc(cx,cy,R+4,0,Math.PI*2); g.stroke();

  // 罗盘标签（在圆圈外，240px 画布 120px 圆心，R+17=107，不会截断）
  const northAng = worldDirToScreenAngle(new THREE.Vector3(0,1,0));
  const labels = [['N',northAng,'rgba(200,215,230,0.9)'],
                  ['E',northAng+Math.PI/2,'rgba(140,158,180,0.7)'],
                  ['S',northAng+Math.PI,'rgba(140,158,180,0.7)'],
                  ['W',northAng-Math.PI/2,'rgba(140,158,180,0.7)']];
  g.font='bold 11px monospace'; g.textAlign='center'; g.textBaseline='middle';
  labels.forEach(([txt,a,col]) => {
    g.fillStyle=col;
    g.fillText(txt, cx+Math.sin(a)*(R+17), cy-Math.cos(a)*(R+17));
  });
}

// ── 车辙印记（带宽度 + 凹陷假阴影）─────────────────────────────────
const TRACK_MAX     = 10000;         // 10000 点 × 2m 间距 = 20km 长
const TRACK_SPACING = 0.002;         // 2m 基础间距（拉长 + 减点数）
const TRACK_WIDTH   = 0.00030;       // 30cm 半宽 = 60cm 全宽（宽轮压痕明显）
const TRACK_LIFT    = 0.000008;      // 0.8cm 微抬，避免与地面面重合
const _trackL = [], _trackR = [];    // {x,y,z,break} 世界坐标 + 断点标记
let   _trackSerial = 0;
let   _trackBreakNext = false;       // 下一个点是腾空后的第一个 → 断开与上一个点连接

const _trackGeo = new THREE.BufferGeometry();
const _tPos    = new Float32Array(TRACK_MAX * 2 * 2 * 3);
const _tNormal = new Float32Array(TRACK_MAX * 2 * 2 * 3);
const _tColor  = new Float32Array(TRACK_MAX * 2 * 2 * 3);
const _tArc    = new Float32Array(TRACK_MAX * 2 * 2);   // 沿轨道累积长度（km），dash 用
_trackGeo.setAttribute('position', new THREE.BufferAttribute(_tPos,    3));
_trackGeo.setAttribute('normal',   new THREE.BufferAttribute(_tNormal, 3));
_trackGeo.setAttribute('color',    new THREE.BufferAttribute(_tColor,  3));
_trackGeo.setAttribute('aArc',     new THREE.BufferAttribute(_tArc,    1));
_trackGeo.setDrawRange(0, 0);

// ── 车辙用 TERRAIN_MAT 派生 shader + dash 切割 ──
const _trackMat = TERRAIN_MAT.clone();
_trackMat.polygonOffset       = true;
_trackMat.polygonOffsetFactor = -4;
_trackMat.polygonOffsetUnits  = -4;
_trackMat.uniforms.sunDir     = terrainUniforms.sunDir;
_trackMat.uniforms.uGroundTex = terrainUniforms.uGroundTex;
// 注入 dash：vertex 加 aArc → varying vArc，fragment 在 main 头做 fract 切割
_trackMat.vertexShader = _trackMat.vertexShader.replace(
  'varying vec3 vViewNormal;',
  'varying vec3 vViewNormal;\n    attribute float aArc;\n    varying float vArc;'
).replace(
  'gl_Position = projectionMatrix * vp;',
  'vArc = aArc;\n      gl_Position = projectionMatrix * vp;'
);
_trackMat.fragmentShader = _trackMat.fragmentShader.replace(
  'varying vec3 vViewNormal;',
  'varying vec3 vViewNormal;\n    varying float vArc;'
).replace(
  'void main() {',
  'void main() {\n      // dash：沿轨道方向 24cm 周期，12cm dash + 12cm 空\n      if (fract(vArc * 4166.7) > 0.5) discard;'
);
_trackMat.needsUpdate = true;

const _trackMesh = new THREE.Mesh(_trackGeo, _trackMat);
_trackMesh.renderOrder = 1;
_trackMesh.frustumCulled = false;
_trackMesh.receiveShadow = true;
_trackMesh.castShadow = false;   // 车辙不自投影，避免怪异
scene.add(_trackMesh);

const TRACK_VCOLOR = new THREE.Color().setRGB(   // 顶点色 = 地面色 × 0.78（再深一档）
  DEFAULT_VERT_COLOR.r * 0.78,
  DEFAULT_VERT_COLOR.g * 0.78,
  DEFAULT_VERT_COLOR.b * 0.78,
);
const TRACK_EXTRA_SPREAD = 0.00025;   // 左右各再外推 25cm

const _tvA = new THREE.Vector3(), _tvB = new THREE.Vector3();
const _tvFwd = new THREE.Vector3(), _tvUp = new THREE.Vector3(), _tvCr = new THREE.Vector3();
function _rebuildTrackGeo() {
  const n = _trackL.length;
  if (n < 2) { _trackGeo.setDrawRange(0, 0); return; }
  // 累计 arc length（沿左轨）
  const arcArr = new Array(n); arcArr[0] = 0;
  for (let i = 1; i < n; i++) {
    const dx = _trackL[i].x - _trackL[i-1].x;
    const dy = _trackL[i].y - _trackL[i-1].y;
    const dz = _trackL[i].z - _trackL[i-1].z;
    arcArr[i] = arcArr[i-1] + Math.sqrt(dx*dx + dy*dy + dz*dz);
  }
  let vi = 0;
  for (let i = 0; i < n; i++) {
    _tvA.set(_trackL[i].x, _trackL[i].y, _trackL[i].z);
    _tvB.set(_trackR[i].x, _trackR[i].y, _trackR[i].z);
    // track tangent: forward/backward difference, clamped
    _tvFwd.set(0,0,0);
    if (i < n-1) { _tvFwd.set(_trackL[i+1].x-_tvA.x, _trackL[i+1].y-_tvA.y, _trackL[i+1].z-_tvA.z); }
    if (i > 0)   { _tvFwd.x+=_tvA.x-_trackL[i-1].x; _tvFwd.y+=_tvA.y-_trackL[i-1].y; _tvFwd.z+=_tvA.z-_trackL[i-1].z; }
    if (_tvFwd.lengthSq()<1e-20) _tvFwd.set(0,0,1);
    _tvFwd.normalize();
    _tvUp.copy(_tvA).normalize();  // radial from planet center
    _tvCr.crossVectors(_tvFwd, _tvUp).normalize();  // cross-track
    // 沿轨道切线方向，cross-track 指向右

    const w = TRACK_WIDTH;
    const arc = arcArr[i];
    // 尾部渐消：i=0 是最旧（颜色 → DEFAULT），i=n-1 是最新（颜色 → TRACK_VCOLOR）
    // 前 30% 的点完全 fade（自然融回地面），后 70% 满色
    const ageT = i / Math.max(n - 1, 1);                    // 0..1（旧→新）
    const fadeIn = Math.max(0, Math.min(1, (ageT - 0.0) / 0.30));   // 0~0.3 区间从 0 到 1
    const vcR = DEFAULT_VERT_COLOR.r * (1 - fadeIn) + TRACK_VCOLOR.r * fadeIn;
    const vcG = DEFAULT_VERT_COLOR.g * (1 - fadeIn) + TRACK_VCOLOR.g * fadeIn;
    const vcB = DEFAULT_VERT_COLOR.b * (1 - fadeIn) + TRACK_VCOLOR.b * fadeIn;
    const aX = _tvA.x + _tvCr.x * TRACK_EXTRA_SPREAD;
    const aY = _tvA.y + _tvCr.y * TRACK_EXTRA_SPREAD;
    const aZ = _tvA.z + _tvCr.z * TRACK_EXTRA_SPREAD;
    const bX = _tvB.x - _tvCr.x * TRACK_EXTRA_SPREAD;
    const bY = _tvB.y - _tvCr.y * TRACK_EXTRA_SPREAD;
    const bZ = _tvB.z - _tvCr.z * TRACK_EXTRA_SPREAD;
    // V 形凹陷：两条带各自的两个边缘把法线"向内"倾斜
    //   tiltSign = -1 → 法线减 cr 方向（偏向 -cr）
    //   tiltSign = +1 → 法线加 cr 方向（偏向 +cr）
    //   两边对向倾斜 → 沟壑效果。低角度光时一边亮一边暗，凹感极强
    const TILT = 0.55;
    function writeVert(vi, px, py, pz, tiltSign) {
      _tPos[vi*3] = px; _tPos[vi*3+1] = py; _tPos[vi*3+2] = pz;
      const r = Math.sqrt(px*px + py*py + pz*pz);
      let nx = px/r + _tvCr.x * tiltSign * TILT;
      let ny = py/r + _tvCr.y * tiltSign * TILT;
      let nz = pz/r + _tvCr.z * tiltSign * TILT;
      const nl = Math.sqrt(nx*nx + ny*ny + nz*nz);
      _tNormal[vi*3]   = nx / nl;
      _tNormal[vi*3+1] = ny / nl;
      _tNormal[vi*3+2] = nz / nl;
      _tColor[vi*3]   = vcR;
      _tColor[vi*3+1] = vcG;
      _tColor[vi*3+2] = vcB;
      _tArc[vi] = arc;
    }
    // 4 个顶点（+cr offset → 法线 -tilt，-cr offset → 法线 +tilt）
    writeVert(vi++, aX+_tvCr.x*w, aY+_tvCr.y*w, aZ+_tvCr.z*w, -1);   // L 外缘
    writeVert(vi++, aX-_tvCr.x*w, aY-_tvCr.y*w, aZ-_tvCr.z*w, +1);   // L 内缘
    writeVert(vi++, bX+_tvCr.x*w, bY+_tvCr.y*w, bZ+_tvCr.z*w, -1);   // R 内缘
    writeVert(vi++, bX-_tvCr.x*w, bY-_tvCr.y*w, bZ-_tvCr.z*w, +1);   // R 外缘
  }
  // Build index: each quad connects pt_i to pt_{i+1}, 4 verts per pt → offset by 4
  const maxIdx = (n-1)*12;
  if (!_trackGeo.index || _trackGeo.index.count < maxIdx) {
    const buf = new Uint32Array((TRACK_MAX-1)*12);
    _trackGeo.index = new THREE.BufferAttribute(buf, 1);
  }
  const idx = _trackGeo.index.array;
  let ii = 0;
  for (let i = 0; i < n-1; i++) {
    // 如果下一个点是 break，跳过 i → i+1 的 quad（腾空跨段不连线）
    if (_trackL[i+1].break) continue;
    const b = i*4;
    idx[ii]=b;   idx[ii+1]=b+4; idx[ii+2]=b+1;  ii+=3;
    idx[ii]=b+1; idx[ii+1]=b+4; idx[ii+2]=b+5;  ii+=3;
    idx[ii]=b+2; idx[ii+1]=b+6; idx[ii+2]=b+3;  ii+=3;
    idx[ii]=b+3; idx[ii+1]=b+6; idx[ii+2]=b+7;  ii+=3;
  }
  _trackGeo.index.needsUpdate = true;
  _trackGeo.attributes.position.needsUpdate = true;
  _trackGeo.attributes.normal.needsUpdate = true;
  _trackGeo.attributes.color.needsUpdate = true;
  _trackGeo.attributes.aArc.needsUpdate = true;
  _trackGeo.setDrawRange(0, ii);
}

function addTrackPoints(lPos, rPos, isBreak) {
  const up   = lPos.clone().normalize();
  const upR  = rPos.clone().normalize();
  // 关键：lPos/rPos 是轮中心（距地表 WHEEL_R_KM），减掉这段下到地表
  const drop = -WHEEL_R_KM + TRACK_LIFT;
  const lp = lPos.clone().addScaledVector(up,  drop);
  const rp = rPos.clone().addScaledVector(upR, drop);
  if (_trackL.length === 0) {
    _trackL.push({x:lp.x, y:lp.y, z:lp.z, break:false});
    _trackR.push({x:rp.x, y:rp.y, z:rp.z, break:false});
    _trackSerial++;
    return;
  }
  if (!isBreak) {
    // 正常间距检查（break 点强制添加，不论距离）
    const last = _trackL[_trackL.length - 1];
    const dx = lp.x - last.x, dy = lp.y - last.y, dz = lp.z - last.z;
    const spdSpacing = Math.max(TRACK_SPACING, Math.abs(car.speed) * 0.006);
    if (dx*dx + dy*dy + dz*dz < spdSpacing * spdSpacing) return;
  }
  _trackL.push({x:lp.x, y:lp.y, z:lp.z, break: !!isBreak});
  _trackR.push({x:rp.x, y:rp.y, z:rp.z, break: !!isBreak});
  _trackSerial++;
  if (_trackL.length > TRACK_MAX) { _trackL.shift(); _trackR.shift(); }
  _rebuildTrackGeo();
}

// ── FPS 计数器 ────────────────────────────────────────────────────────
let _fpsFrames = 0, _fpsTime = performance.now(), _fpsVal = 0;

// ── 渲染循环 ──────────────────────────────────────────────────────────
renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.05);
  update(dt);
  renderer.render(scene, camera);
  drawMinimap();
  // FPS
  _fpsFrames++;
  const now = performance.now();
  if (now - _fpsTime >= 500) {
    _fpsVal = Math.round(_fpsFrames / ((now - _fpsTime) / 1000));
    _fpsFrames = 0; _fpsTime = now;
    document.getElementById('fps').textContent = _fpsVal;
  }
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
